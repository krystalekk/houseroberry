<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel rabunku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <section class="panel">
            <div class="shine"></div>
            <div class="eyebrow">Panel rabunku</div>

            <header class="topbar">
                <div class="headline">
                    <p class="kicker" id="street">Nieznana ulica</p>
                    <h1 id="label">Nieznana posesja</h1>
                    <p class="owner" id="owner">Nieznany wlasciciel</p>
                </div>

                <div class="timer-wrap">
                    <span>Pozostalo</span>
                    <strong id="timer">00:00</strong>
                </div>
            </header>

            <section class="meta-grid">
                <article class="card">
                    <span class="card-label">Poziom</span>
                    <strong id="tier">STANDARD</strong>
                </article>
                <article class="card">
                    <span class="card-label">Alarm</span>
                    <strong id="alarm">Nieaktywny</strong>
                </article>
                <article class="card accent-card">
                    <span class="card-label">Loot</span>
                    <strong id="loot">0</strong>
                </article>
            </section>

            <section class="stats-row">
                <div class="stat-block">
                    <span class="card-label">Przeszukane miejsca</span>
                    <strong id="searched">0 / 0</strong>
                </div>
                <div class="status-pill" id="status-pill">Cicho i szybko</div>
            </section>

            <div class="progress-shell">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <footer class="footer">
                <span id="status-text">Zachowaj spokoj, bierz najlepszy loot i pilnuj czasu.</span>
            </footer>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
